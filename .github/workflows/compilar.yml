name: Compilar APK de Kivy

on:
  # Permite activar la compilación manualmente desde la pestaña "Actions" de GitHub
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Copia el código del repositorio a la máquina virtual de GitHub
      - name: Descargar código
        uses: actions/checkout@v4  
        
      # Configura Java 17 de forma oficial (soluciona el error de OpenJDK)
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Instala Python 3.11 para asegurar compatibilidad estable con Kivy
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Instala las dependencias del sistema que Buildozer necesita en Ubuntu
      - name: Instalar dependencias de Ubuntu
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ccache \
            git \
            libffi-dev \
            libssl-dev \
            unzip \
            zip \
            zlib1g-dev

      # Instala las herramientas de Python limpiamente con pip
      - name: Instalar Buildozer y Cython
        run: |
          pip install --upgrade pip
          pip install --user buildozer cython sh

      # Ejecuta la compilación de forma nativa en la máquina virtual
      - name: Compilar con Buildozer
        run: |
          buildozer android debug

      # 3. Guarda el archivo .apk resultante para que los demás lo descarguen
      - name: Subir APK terminada
        uses: actions/upload-artifact@v4
        with:
          name: aplicacion-android
          path: bin/*.apk
